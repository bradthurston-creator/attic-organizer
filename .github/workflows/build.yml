name: Build Android APK + AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          cd capacitor
          npm install

      - name: Apply NFC plugin patch
        run: |
          cp patches/CapacitorNfcPlugin.java capacitor/node_modules/@capgo/capacitor-nfc/android/src/main/java/app/capgo/nfc/CapacitorNfcPlugin.java

      - name: Sync Capacitor
        run: |
          cd capacitor
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd capacitor/android
          ./gradlew assembleDebug

      - name: Build Signed Release AAB (for Google Play)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd capacitor/android
          ./gradlew bundleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AtticOrganizer-Debug
          path: capacitor/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: AtticOrganizer-Release
          path: capacitor/android/app/build/outputs/bundle/release/app-release.aab