workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      node: latest
      java: 21
    scripts:
      - name: Install npm dependencies
        script: cd capacitor && npm install
      - name: Build Android APK
        script: |
          cd capacitor
          npx cap sync android
          cd android
          ./gradlew assembleDebug
    artifacts:
      - capacitor/android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - brad.thurston@gmail.com

  ios-build:
    name: iOS Build + TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        APP_ID: com.atticorganizer.app
        APP_NAME: Attic Organizer
        APP_STORE_CONNECT_ISSUER_ID: fa233451-1f0a-4677-baac-21185e4cb1ec
        APP_STORE_CONNECT_KEY_IDENTIFIER: 2NBS93SRAY
        DEVELOPMENT_TEAM: DN52659LL2
      groups:
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: |
          cd capacitor
          npm install

      - name: Sync Capacitor with iOS
        script: |
          cd capacitor
          npx cap sync ios

      - name: Set up keychain and code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $APP_ID \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
          # Copy profile to MobileDevice for xcodebuild export
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"*.mobileprovision \
             "$HOME/Library/MobileDevice/Provisioning Profiles/"
          # Extract the provisioning profile UUID and update exportOptions.plist
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          for f in "$PROFILE_PATH"/*.mobileprovision; do
            if [ -f "$f" ]; then
              UUID=$(security cms -D -i "$f" 2>/dev/null | plutil -extract UUID raw -o - - 2>/dev/null)
              if [ -n "$UUID" ]; then
                echo "Found provisioning profile: $UUID"
                /usr/libexec/PlistBuddy -c "Set :provisioningProfiles:$APP_ID $UUID" capacitor/ios/exportOptions.plist 2>/dev/null || \
                /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" -c "Add :provisioningProfiles:$APP_ID string $UUID" capacitor/ios/exportOptions.plist
                break
              fi
            fi
          done
          echo "Updated exportOptions.plist with UUID"

      - name: Build iOS app
        script: |
          cd capacitor/ios/App
          xcodebuild -resolvePackageDependencies
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/xcarchive/App.xcarchive \
            archive

      - name: Export IPA
        script: |
          mkdir -p /tmp/ipa
          xcodebuild -exportArchive \
            -archivePath /tmp/xcarchive/App.xcarchive \
            -exportPath /tmp/ipa \
            -exportOptionsPlist capacitor/ios/exportOptions.plist \
            -allowProvisioningUpdates

    artifacts:
      - /tmp/xcarchive/*.xcarchive
      - /tmp/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: 2NBS93SRAY
        issuer_id: fa233451-1f0a-4677-baac-21185e4cb1ec
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - brad.thurston@gmail.com