workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      node: latest
      java: 21
    scripts:
      - name: Install npm dependencies
        script: cd capacitor && npm install
      - name: Build Android APK
        script: |
          cd capacitor
          npx cap sync android
          cd android
          ./gradlew assembleDebug
    artifacts:
      - capacitor/android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - brad.thurston@gmail.com