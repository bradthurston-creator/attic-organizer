workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      node: latest
      java: 21
    scripts:
      - name: Install npm dependencies
        script: cd capacitor && npm install
      - name: Build Android APK
        script: |
          cd capacitor
          npx cap sync android
          cd android
          ./gradlew assembleDebug
    artifacts:
      - capacitor/android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - brad.thurston@gmail.com

  ios-build:
    name: iOS Build + TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        APP_ID: com.atticorganizer.app
        APP_STORE_CONNECT_KEY_IDENTIFIER: 2NBS93SRAY
        APP_STORE_CONNECT_ISSUER_ID: fa233451-1f0a-4677-baac-21185e4cb1ec
        DEVELOPMENT_TEAM: DN52659LL2
      groups:
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: |
          cd capacitor
          npm install

      - name: Sync Capacitor with iOS
        script: |
          cd capacitor
          npx cap sync ios

      - name: Set up keychain and code signing
        script: |
          keychain initialize
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 -d > /tmp/cert.key
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 -d > /tmp/asc.p8
          app-store-connect fetch-signing-files \
            $APP_ID \
            --type IOS_APP_STORE \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @file:/tmp/asc.p8 \
            --certificate-key @file:/tmp/cert.key \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS app
        script: |
          cd capacitor/ios/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $APP_ID" App/Info.plist
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/xcarchive/App.xcarchive \
            -allowProvisioningUpdates \
            archive

      - name: Export IPA
        script: |
          mkdir -p /tmp/ipa
          xcodebuild -exportArchive \
            -archivePath /tmp/xcarchive/App.xcarchive \
            -exportPath /tmp/ipa \
            -exportOptionsPlist capacitor/ios/exportOptions.plist \
            -allowProvisioningUpdates

    artifacts:
      - /tmp/xcarchive/*.xcarchive
      - /tmp/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - brad.thurston@gmail.com