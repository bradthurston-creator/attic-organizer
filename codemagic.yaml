workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      node: latest
      java: 21
    scripts:
      - name: Install npm dependencies
        script: cd capacitor && npm install
      - name: Build Android APK
        script: |
          cd capacitor
          npx cap sync android
          cd android
          ./gradlew assembleDebug
    artifacts:
      - capacitor/android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - brad.thurston@gmail.com

  ios-build:
    name: iOS Build + TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        APP_ID: com.atticorganizer.app
        APP_NAME: Attic Organizer
        APP_STORE_CONNECT_ISSUER_ID: ""
        APP_STORE_CONNECT_KEY_IDENTIFIER: ""
        DEVELOPMENT_TEAM: ""
      groups:
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: |
          cd capacitor
          npm install

      - name: Sync Capacitor with iOS
        script: |
          cd capacitor
          npx cap sync ios

      - name: Set up keychain and code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $APP_ID \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
          # Copy profile to MobileDevice for xcodebuild export
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"*.mobileprovision \
             "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Build iOS app
        script: |
          cd capacitor/ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/xcarchive/App.xcarchive \
            -allowProvisioningUpdates \
            archive

      - name: Export IPA
        script: |
          mkdir -p /tmp/ipa
          xcodebuild -exportArchive \
            -archivePath /tmp/xcarchive/App.xcarchive \
            -exportPath /tmp/ipa \
            -exportOptionsPlist capacitor/ios/exportOptions.plist \
            -allowProvisioningUpdates

    artifacts:
      - /tmp/xcarchive/*.xcarchive
      - /tmp/ipa/*.ipa

    publishing:
      email:
        recipients:
          - brad.thurston@gmail.com